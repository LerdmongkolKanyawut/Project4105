<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>แก้ไขรายวิชา</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../css/css_courses_edit.css">
        <link rel="stylesheet" href="../css/css_responsive.css">
    </head>
    <body>
        <div class="page-wrapper">
            <div class="title-bar">แก้ไขรายวิชา</div>
            <div class="nav-bar">
                <button class="hamburger" onclick="this.closest('.nav-bar').classList.toggle('open')">&#9776;</button>
                <div class="nav-links">
                    <button class="nav-btn" onclick="location.href = '../index.html'">หน้าหลัก</button>
                    <button class="nav-btn" onclick="location.href = '../upload.html'">Upload</button>
                    <button class="nav-btn" onclick="location.href = '../contact.html'">ติดต่อ</button>
                    <button class="nav-btn" onclick="location.href = '../courses.html'">รายละเอียดวิชา</button>
                    <button class="nav-btn active" id="btn-mgmt" style="display:none" onclick="location.href = 'management.html'">จัดการระบบ</button>
                </div>
                <span class="nav-welcome" id="nav-welcome">Welcome, Guest</span>
                <button class="nav-btn profile-btn" id="btn-profile" style="display:none" onclick="location.href='profile.html'">โปรไฟล์</button>
                <button class="nav-btn" id="btn-auth" onclick="handleAuth()">Login</button>
            </div>

            <div class="access-denied" id="access-denied" style="display:none">
                <div style="font-size:2.5rem">&#128274;</div>
                <h2>ไม่มีสิทธิ์เข้าถึง</h2>
                <p>หน้านี้สำหรับผู้ดูแลระบบ (Admin) เท่านั้น</p>
            </div>

            <div class="content" id="main-content" style="display:none">
                <div class="page-header">
                    <button class="back-btn" onclick="location.href = '../management.html'">&#8592; กลับ</button>
                    <div class="page-title">&#128218; แก้ไขรายวิชา</div>
                </div>
                <div class="toolbar">
                    <button class="btn primary" onclick="openAddModal()">+ เพิ่มรายวิชา</button>
                </div>
                <div id="table-wrap"><div class="loading-msg">กำลังโหลดข้อมูล...</div></div>
            </div>
        </div>

        <!-- Modal เพิ่ม/แก้ไขวิชา -->
        <div class="modal-overlay" id="modal" onclick="closeOutside(event)">
            <div class="modal-box">
                <button class="modal-close" onclick="closeModal()">&#10005;</button>
                <div class="modal-title" id="modal-title">เพิ่มรายวิชา</div>

                <div class="form-row2">
                    <div class="form-group">
                        <label>รหัสวิชา <span class="req">*</span></label>
                        <input type="text" id="f-code" placeholder="เช่น COS4105"/>
                    </div>
                    <div class="form-group">
                        <label>หน่วยกิต <span class="req">*</span></label>
                        <input type="number" id="f-credit" min="1" max="9" placeholder="3"/>
                    </div>
                </div>
                <div class="form-group">
                    <label>ชื่อวิชา <span class="req">*</span></label>
                    <input type="text" id="f-name" placeholder="ชื่อวิชาภาษาไทยหรืออังกฤษ"/>
                </div>
                <div class="form-row2">
                    <div class="form-group">
                        <label>วิชาที่ต้องเรียนก่อน (PR)</label>
                        <input type="text" id="f-pr" placeholder="None"/>
                    </div>
                    <div class="form-group">
                        <label>วันสอบ / หมายเหตุสอบ</label>
                        <input type="text" id="f-exam" placeholder="สอบปลายภาคตามตาราง"/>
                    </div>
                </div>
                <div class="form-group">
                    <label>คำอธิบายรายวิชา</label>
                    <textarea id="f-desc" placeholder="คำอธิบายรายวิชา..."></textarea>
                </div>

                <!-- ตารางเรียน -->
                <div class="form-group">
                    <label>ตารางเรียน</label>
                    <div class="dyn-list" id="sched-list">
                        <div class="sched-header">
                            <span>ประเภทคาบ</span>
                            <span>วัน</span>
                            <span>เวลาเริ่ม</span>
                            <span>เวลาสิ้นสุด</span>
                            <span>ห้องเรียน</span>
                            <span></span>
                        </div>
                    </div>
                    <button class="dyn-add" onclick="addSchedRow()">+ เพิ่มตารางเรียน</button>
                </div>

                <!-- ลิงก์ -->
                <div class="form-group">
                    <label>ลิงก์ที่เกี่ยวข้อง</label>
                    <div class="dyn-list" id="link-list"></div>
                    <button class="dyn-add" onclick="addLinkRow()">+ เพิ่มลิงก์</button>
                </div>

                <div id="modal-msg" style="font-size:0.88rem;min-height:1.2em;margin-top:6px;color:#c00"></div>
                <div class="modal-footer">
                    <button class="btn" onclick="closeModal()">ยกเลิก</button>
                    <button class="btn success" id="btn-save" onclick="saveCourse()">&#10003; บันทึก</button>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>

        <script src="../js/js_courses_edit.js"></script>
    </body>
</html>
