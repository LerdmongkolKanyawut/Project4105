<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>รายงานปัญหา</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../css/css_report_list.css">
        <link rel="stylesheet" href="../css/css_responsive.css">
    </head>
    <body>
        <div class="page-wrapper">
            <div class="title-bar">รายงานปัญหา</div>
            <div class="nav-bar">
                <button class="hamburger" onclick="this.closest('.nav-bar').classList.toggle('open')">&#9776;</button>
                <div class="nav-links">
                    <button class="nav-btn" onclick="location.href = '../index.html'">หน้าหลัก</button>
                    <button class="nav-btn" onclick="location.href = '../upload.html'">Upload</button>
                    <button class="nav-btn" onclick="location.href = '../contact.html'">ติดต่อ</button>
                    <button class="nav-btn" onclick="location.href = '../courses.html'">รายละเอียดวิชา</button>
                    <button class="nav-btn active" id="btn-mgmt" style="display:none" onclick="location.href = 'management.html'">จัดการระบบ</button>
                </div>
                <span class="nav-welcome" id="nav-welcome">Welcome, Guest</span>
                <button class="nav-btn profile-btn" id="btn-profile" style="display:none" onclick="location.href='profile.html'">โปรไฟล์</button>
                <button class="nav-btn" id="btn-auth" onclick="handleAuth()">Login</button>
            </div>

            <div class="access-denied" id="access-denied" style="display:none">
                <div class="icon">&#128274;</div>
                <h2>ไม่มีสิทธิ์เข้าถึง</h2>
                <p>หน้านี้สำหรับผู้ดูแลระบบ (Admin) เท่านั้น</p>
            </div>

            <div class="content" id="main-content" style="display:none">
                <div class="page-header">
                    <button class="back-btn" onclick="location.href = '../management.html'">&#8592; กลับ</button>
                    <div class="page-title">&#128027; รายงานปัญหา</div>
                </div>
                <div class="toolbar">
                    <input type="text" id="search" placeholder="ค้นหาหัวข้อ / รายละเอียด / ผู้แจ้ง..." oninput="filterBugs()"/>
                    <select id="status-filter" onchange="filterBugs()">
                        <option value="">ทุกสถานะ</option>
                        <option value="pending">Pending</option>
                        <option value="in_progress">In Progress</option>
                        <option value="resolved">Resolved</option>
                    </select>
                </div>
                <div class="stat-bar" id="stat-bar"></div>
                <div id="table-wrap"><div class="loading-msg">กำลังโหลดข้อมูล...</div></div>
            </div>
        </div>

        <!-- Modal แก้ไขสถานะ -->
        <div class="modal-overlay" id="modal" onclick="closeOutside(event)">
            <div class="modal-box">
                <button class="modal-close" onclick="closeModal()">&#10005;</button>
                <div class="modal-title">&#9998; แก้ไขสถานะรายงาน</div>
                <div class="modal-info" id="modal-info"></div>
                <div class="form-group">
                    <label>สถานะ</label>
                    <select id="modal-status">
                        <option value="pending">Pending — รอดำเนินการ</option>
                        <option value="in_progress">In Progress — กำลังดำเนินการ</option>
                        <option value="resolved">Resolved — แก้ไขแล้ว</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button class="btn" onclick="closeModal()">ยกเลิก</button>
                    <button class="btn primary" id="btn-save-status" onclick="saveStatus()">&#10003; บันทึก</button>
                </div>
            </div>
        </div>

        <script src="../js/js_report_list.js"></script>
    </body>
</html>
