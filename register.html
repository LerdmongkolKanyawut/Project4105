<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>สมัครสมาชิก</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/css_register.css">
        <link rel="stylesheet" href="css/css_responsive.css">
    </head>
    <body>

        <!-- STEP 1: เลือก Role -->
        <div class="card" id="step-select">
            <h1>สมัครสมาชิก</h1>
            <p class="subtitle">เลือกประเภทบัญชีที่ต้องการสมัคร</p>
            <div class="role-grid">
                <div class="role-card" id="card-general" onclick="selectRole('บุคคลทั่วไป', 'card-general')">
                    <div class="role-icon">
                        <svg width="80" height="128" viewBox="0 0 80 128" fill="none">
                        <circle cx="40" cy="16" r="14" fill="#111"/>
                        <rect x="22" y="34" width="36" height="52" rx="5" fill="#111"/>
                        <rect x="22" y="82" width="15" height="42" rx="5" fill="#111"/>
                        <rect x="43" y="82" width="15" height="42" rx="5" fill="#111"/>
                        <rect x="4"  y="34" width="18" height="13" rx="5" fill="#111"/>
                        <rect x="58" y="34" width="18" height="13" rx="5" fill="#111"/>
                        </svg>
                    </div>
                    <span class="role-label">บุคคลทั่วไป</span>
                </div>
                <div class="role-card" id="card-student" onclick="selectRole('นักศึกษา', 'card-student')">
                    <div class="role-icon">
                        <svg width="126" height="128" viewBox="0 0 126 128" fill="none">
                        <circle cx="32" cy="16" r="13" fill="#1a6fa8"/>
                        <rect x="18" y="32" width="28" height="50" rx="4" fill="#1a6fa8"/>
                        <rect x="18" y="78" width="12" height="46" rx="4" fill="#1a6fa8"/>
                        <rect x="34" y="78" width="12" height="46" rx="4" fill="#1a6fa8"/>
                        <rect x="4"  y="32" width="14" height="12" rx="4" fill="#1a6fa8"/>
                        <rect x="46" y="32" width="14" height="12" rx="4" fill="#1a6fa8"/>
                        <circle cx="94" cy="15" r="13" stroke="#1a6fa8" stroke-width="3" fill="none"/>
                        <path d="M78 32 Q94 26 110 32 L116 80 H72 Z" fill="#1a6fa8"/>
                        <rect x="60" y="32" width="18" height="12" rx="4" fill="#1a6fa8"/>
                        <rect x="110" y="32" width="18" height="12" rx="4" fill="#1a6fa8"/>
                        <rect x="73" y="78" width="12" height="46" rx="4" fill="#1a6fa8"/>
                        <rect x="89" y="78" width="12" height="46" rx="4" fill="#1a6fa8"/>
                        </svg>
                    </div>
                    <span class="role-label">นักศึกษา</span>
                </div>
                <div class="role-card" id="card-teacher" onclick="selectRole('อาจารย์', 'card-teacher')">
                    <div class="role-icon">
                        <svg width="130" height="138" viewBox="0 0 130 138" fill="none">
                        <circle cx="33" cy="15" r="13" fill="#1a6fa8"/>
                        <rect x="18" y="31" width="30" height="56" rx="2" fill="#1a6fa8"/>
                        <polygon points="33,31 30,52 33,58 36,52" fill="#fff"/>
                        <polygon points="18,31 28,31 24,48" fill="#0d4d78"/>
                        <polygon points="48,31 38,31 42,48" fill="#0d4d78"/>
                        <rect x="4"  y="31" width="14" height="12" rx="2" fill="#1a6fa8"/>
                        <rect x="48" y="31" width="14" height="12" rx="2" fill="#1a6fa8"/>
                        <rect x="18" y="84" width="12" height="50" rx="2" fill="#1a6fa8"/>
                        <rect x="36" y="84" width="12" height="50" rx="2" fill="#1a6fa8"/>
                        <ellipse cx="97" cy="14" rx="13" ry="14" fill="#1a6fa8"/>
                        <rect x="82" y="31" width="30" height="42" rx="2" fill="#1a6fa8"/>
                        <polygon points="82,31 92,31 88,47" fill="#0d4d78"/>
                        <polygon points="112,31 102,31 106,47" fill="#0d4d78"/>
                        <path d="M80 71 L114 71 L118 134 H76 Z" fill="#1a6fa8"/>
                        <rect x="66" y="31" width="16" height="12" rx="2" fill="#1a6fa8"/>
                        <rect x="112" y="31" width="16" height="12" rx="2" fill="#1a6fa8"/>
                        </svg>
                    </div>
                    <span class="role-label">อาจารย์</span>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn" onclick="location.href = 'login.html'">ยกเลิก</button>
                <button class="btn primary" onclick="goToForm()">ถัดไป &rarr;</button>
            </div>
        </div>

        <!-- STEP 2: กรอกข้อมูล -->
        <div class="card" id="step-form">
            <h1>สมัครสมาชิก</h1>
            <div class="msg" id="msg"></div>

            <div class="form-grid">
                <div class="field full-row">
                    <label>ตำแหน่ง (Role)</label>
                    <input type="text" id="role-display" readonly/>
                </div>
                <div class="field">
                    <label>ชื่อ</label>
                    <input type="text" id="reg-firstname" placeholder="กรอกชื่อ"/>
                </div>
                <div class="field">
                    <label>Username</label>
                    <input type="text" id="reg-username" placeholder="กรอก Username"/>
                </div>
                <div class="field">
                    <label>นามสกุล</label>
                    <input type="text" id="reg-lastname" placeholder="กรอกนามสกุล"/>
                </div>
                <div class="field">
                    <label>Password</label>
                    <div class="pw-wrap">
                        <input type="password" id="reg-pass" placeholder="กรอกรหัสผ่าน"/>
                        <button type="button" class="toggle-eye"
                                onclick="togglePwd('reg-pass')">&#128065;</button>
                    </div>
                </div>
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="example@email.com"/>
                </div>
                <div class="field">
                    <label>Confirm Password</label>
                    <div class="pw-wrap">
                        <input type="password" id="reg-confirm" placeholder="ยืนยันรหัสผ่าน"/>
                        <button type="button" class="toggle-eye"
                                onclick="togglePwd('reg-confirm')">&#128065;</button>
                    </div>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn" onclick="goBack()">&larr; ย้อนกลับ</button>
                <button class="btn primary" id="btn-submit" onclick="doRegister()">สมัครสมาชิก</button>
            </div>
            <div class="back-link">
                <a onclick="location.href = 'login.html'">มีบัญชีอยู่แล้ว? เข้าสู่ระบบ</a>
            </div>
        </div>

        <script src="js/js_register.js"></script>
    </body>
</html>
