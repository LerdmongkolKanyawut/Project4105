<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>รีเซ็ตรหัสผ่าน</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/css_reset.css">
        <link rel="stylesheet" href="css/css_responsive.css">
    </head>
    <body>
        <div class="card">
            <h1>รีเซ็ตรหัสผ่าน</h1>
            <p class="subtitle">กรอก Email ที่ลงทะเบียนไว้เพื่อรับลิงก์รีเซ็ตรหัสผ่าน</p>

            <div class="msg" id="msg"></div>

            <div class="form-row">
                <label for="reset-email">Email</label>
                <input type="email" id="reset-email" placeholder="example@email.com"/>
            </div>

            <div class="btn-center">
                <button class="btn" id="btn-reset" onclick="doReset()">ส่งลิงก์รีเซ็ต</button>
            </div>

            <div class="back">
                <a onclick="location.href = 'login.html'">← กลับไปหน้าเข้าสู่ระบบ</a>
            </div>
        </div>

        <script>
            /* ── AJAX POST → ResetServlet ── */
            function doReset() {
                const email = document.getElementById('reset-email').value.trim();
                if (!email || !email.includes('@')) {
                    setMsg('error', 'กรุณากรอก Email ที่ถูกต้อง');
                    return;
                }

                const btn = document.getElementById('btn-reset');
                btn.disabled = true;
                btn.textContent = 'กำลังส่ง...';

                /*
                 * ResetServlet รับ POST application/x-www-form-urlencoded
                 * คืน JSON:
                 *   { "success": true,  "message": "ส่งลิงก์..." }
                 *   { "success": false, "message": "ไม่พบ email นี้ในระบบ" }
                 */
                fetch('ResetServlet', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: 'email=' + encodeURIComponent(email)
                })
                        .then(r => r.json())
                        .then(res => {
                            if (res.success) {
                                setMsg('success', res.message || ('ส่งลิงก์รีเซ็ตรหัสผ่านไปยัง ' + email + ' เรียบร้อยแล้ว'));
                                document.getElementById('reset-email').value = '';
                            } else {
                                setMsg('error', res.message || 'ไม่พบ Email นี้ในระบบ');
                            }
                            btn.disabled = false;
                            btn.textContent = 'ส่งลิงก์รีเซ็ต';
                        })
                        .catch(() => {
                            setMsg('error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่');
                            btn.disabled = false;
                            btn.textContent = 'ส่งลิงก์รีเซ็ต';
                        });
            }

            function setMsg(type, text) {
                const el = document.getElementById('msg');
                el.className = 'msg ' + type;
                el.textContent = text;
            }

            document.addEventListener('keydown', e => {
                if (e.key === 'Enter')
                    doReset();
            });
        </script>
    </body>
</html>
